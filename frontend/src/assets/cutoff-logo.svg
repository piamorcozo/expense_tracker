<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Cutoff">
  <defs>
    <linearGradient id="bg" x1="64" y1="8" x2="64" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F2EF"/>
      <stop offset="100%" stop-color="#D5E6E1"/>
    </linearGradient>
    <linearGradient id="pig" x1="36" y1="28" x2="96" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A6B5E"/>
      <stop offset="100%" stop-color="#16423C"/>
    </linearGradient>
    <linearGradient id="glass" x1="48" y1="52" x2="92" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#16423C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Soft squircle -->
  <rect x="8" y="8" width="112" height="112" rx="32" fill="url(#bg)"/>

  <!-- Piggy body -->
  <g filter="url(#soft)">
    <ellipse cx="62" cy="70" rx="34" ry="26" fill="url(#pig)"/>
    <!-- snout -->
    <ellipse cx="88" cy="72" rx="14" ry="11" fill="url(#pig)"/>
    <!-- glass highlight on snout (inspo feel) -->
    <ellipse cx="88" cy="72" rx="11" ry="8.5" fill="url(#glass)"/>
    <!-- nostrils -->
    <ellipse cx="84.5" cy="72" rx="2.4" ry="3.4" fill="#E8F2EF" fill-opacity="0.95"/>
    <ellipse cx="92" cy="72" rx="2.4" ry="3.4" fill="#E8F2EF" fill-opacity="0.95"/>
    <!-- ear -->
    <path d="M42 52c0-10 8-18 16-18 2 8-2 16-8 22-4 1-8-1-8-4z" fill="url(#pig)"/>
    <!-- eye -->
    <circle cx="70" cy="58" r="3.2" fill="#E8F2EF"/>
    <!-- coin slot -->
    <rect x="52" y="48" width="18" height="3.5" rx="1.75" fill="#0F2F2B" fill-opacity="0.55"/>
    <!-- legs -->
    <rect x="44" y="90" width="8" height="10" rx="3" fill="#16423C"/>
    <rect x="66" y="90" width="8" height="10" rx="3" fill="#16423C"/>
    <!-- tail -->
    <path d="M30 72c-6 2-8 8-4 12" fill="none" stroke="#16423C" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Sparkle -->
  <g fill="#16423C">
    <path d="M104 34l2.2 5.4 5.4 2.2-5.4 2.2L104 49.2l-2.2-5.4-5.4-2.2 5.4-2.2z"/>
    <path d="M114 48l1.2 2.8 2.8 1.2-2.8 1.2-1.2 2.8-1.2-2.8-2.8-1.2 2.8-1.2z" opacity="0.7"/>
  </g>
</svg>
