<div class="modal-overlay" *ngIf="message" (click)="onOverlayClick($event)">
  <div class="modal success-modal">
    <div class="success-icon-wrap">
      <iconify-icon icon="ph:check-circle-fill" class="success-icon"></iconify-icon>
    </div>
    <div class="modal-title success-title">{{ message }}</div>
    <div class="modal-actions">
      <button class="btn-primary" (click)="close()">Okay</button>
    </div>
  </div>
</div>
